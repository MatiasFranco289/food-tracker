services:
  db:
    image: postgres:16-alpine
    container_name: food-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-foodtracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foodtracker}
      POSTGRES_DB: ${POSTGRES_DB:-foodtracker}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-foodtracker} -d ${POSTGRES_DB:-foodtracker}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: food-tracker-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-foodtracker}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-foodtracker}
      DB_NAME: ${POSTGRES_DB:-foodtracker}
      JWT_SECRET: ${JWT_SECRET}
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    ports:
      - "3001:3001"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
